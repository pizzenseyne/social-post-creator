const CHAR_LIMITS = { instagram: 2200, facebook: 63000, tiktok: 150, google_my_business: 1500 };

const STATUS_COLORS = {
  pending: 'bg-amber-100 text-amber-700',
  published: 'bg-green-100 text-green-700',
  failed: 'bg-red-100 text-red-700',
};

// ─── Helpers ─────────────────────────────────────────────────────────────────

const formatBytes = (b) => b < 1024*1024 ? `${(b/1024).toFixed(0)} Ko` : `${(b/1024/1024).toFixed(1)} Mo`;
const formatDate = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
};
const getPlatform = (id) => PLATFORMS.find(p => p.id === id);

async function api(path, opts = {}) {
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || 'Erreur serveur');
  }
  return res.json();
}

// ─── Composants UI ───────────────────────────────────────────────────────────

function Spinner({ size = 5 }) {
  return <svg className={`spin w-${size} h-${size} text-indigo-600`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
  </svg>;
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-indigo-600' };
  return (
    <div className={`fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-xl text-white shadow-lg ${colors[type]} transition-all`}>
      <span className="text-sm font-medium">{message}</span>
      <button onClick={onClose} className="opacity-70 hover:opacity-100 text-lg leading-none">×</button>
    </div>
  );
}

function Badge({ status }) {
  return <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${STATUS_COLORS[status]}`}>{STATUS_LABELS[status]}</span>;

// ─── Step indicator ───────────────────────────────────────────────────────────

function StepBar({ step }) {
  const steps = ['Média', 'Générer', 'Publier'];
  return (
    <div className="step-bar mb-8">
      {steps.map((label, i) => {
        const n = i + 1;
        const done = n < step;
        const active = n === step;
        return (
          <React.Fragment key={n}>
            <div className="flex flex-col items-center gap-1">
              <div className={`step-dot text-sm ${done ? 'bg-indigo-600 text-white' : active ? 'bg-indigo-600 text-white ring-4 ring-indigo-100' : 'bg-slate-200 text-slate-500'}`}>
                {done ? '✓' : n}
              </div>
              <span className={`text-xs font-medium ${active ? 'text-indigo-600' : 'text-slate-400'}`}>{label}</span>
            </div>
            {i < steps.length - 1 && (
              <div className={`step-line mb-4 ${n < step ? 'bg-indigo-600' : 'bg-slate-200'}`} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ─── Step 1: Upload ──────────────────────────────────────────────────────────

function Step1Upload({ onNext }) {
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState('');
  const inputRef = useRef();

  const handleFile = async (file) => {
    setError('');
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const data = await api('/api/upload', { method: 'POST', body: fd });
      onNext(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setUploading(false);
    }
  };

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  }, []);

  return (
    <div className="max-w-lg mx-auto">
      <h2 className="text-2xl font-bold text-slate-900 mb-1">Votre média</h2>
      <p className="text-slate-500 mb-8">Importez une photo ou une vidéo pour votre post</p>

      <div
        className={`drop-zone border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer ${dragging ? 'drag-over' : 'border-slate-300 hover:border-indigo-400 hover:bg-indigo-50/30'}`}
        onClick={() => !uploading && inputRef.current.click()}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
      >
        {uploading ? (
          <div className="flex flex-col items-center gap-3">
            <Spinner size={8} />
            <p className="text-slate-500 font-medium">Upload en cours...</p>
          </div>
        ) : (
          <>
            <div className="text-5xl mb-4">📁</div>
            <p className="text-slate-700 font-semibold text-lg mb-1">Glissez votre fichier ici</p>
            <p className="text-slate-400 text-sm mb-4">ou cliquez pour sélectionner</p>
            <div className="flex flex-wrap justify-center gap-2">
              {['JPG', 'PNG', 'WEBP', 'MP4', 'MOV'].map(f => (
                <span key={f} className="bg-slate-100 text-slate-500 text-xs px-2 py-1 rounded">{f}</span>
              ))}
            </div>
          </>
        )}
      </div>

      {error && <p className="mt-3 text-red-600 text-sm text-center">{error}</p>}

      <input ref={inputRef} type="file" className="hidden"
        accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime,video/x-msvideo,video/webm"
        onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
    </div>
  );
}

// ─── Step 2: Configure & Generate ────────────────────────────────────────────

function Step2Configure({ media, onNext, onBack }) {
  const [platform, setPlatform] = useState('instagram');
  const [tone, setTone] = useState('professionnel');
  const [answers, setAnswers] = useState({});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const isVideo = media.media_type === 'video';

  const generate = async () => {
    setError('');
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append('media_path', media.path);
      fd.append('platform', platform);
      fd.append('tone', tone);
      fd.append('questionnaire', JSON.stringify(answers));
      const data = await api('/api/generate', { method: 'POST', body: fd });
      onNext({ ...data, platform, tone });
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="max-w-2xl mx-auto">
      <h2 className="text-2xl font-bold text-slate-900 mb-1">Parlez-nous de votre contenu</h2>
      <p className="text-slate-500 mb-6">Plus vous répondez, plus l'IA sera précise dans sa rédaction</p>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

        {/* Colonne gauche : questionnaire */}
        <div>
          {/* Aperçu miniature */}
          <div className="mb-4 rounded-xl overflow-hidden bg-slate-100 h-40 flex items-center justify-center relative">
            {isVideo
              ? <video src={media.path} className="w-full h-full object-contain" />
              : <img src={media.path} alt="Média" className="w-full h-full object-contain" />}
            <div className="absolute top-2 right-2 bg-black/50 text-white text-xs px-2 py-1 rounded-full">
              {isVideo ? '🎬' : '🖼️'} {formatBytes(media.size)}
            </div>
          </div>

          <Questionnaire answers={answers} onChange={setAnswers} isVideo={isVideo} />
        </div>

        {/* Colonne droite : plateforme + ton + bouton */}
        <div className="flex flex-col gap-5">

          {/* Plateforme */}
          <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
            <label className="block text-sm font-semibold text-slate-700 mb-3">📱 Plateforme cible</label>
            <div className="grid grid-cols-2 gap-2">
              {PLATFORMS.map(p => (
                <button key={p.id} onClick={() => setPlatform(p.id)}
                  className={`flex items-center gap-2 px-3 py-2.5 rounded-xl border-2 text-sm font-medium transition-all ${
                    platform === p.id ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-slate-200 hover:border-slate-300 text-slate-600'
                  }`}>
                  <span style={{ color: p.color }}>{p.icon}</span>
                  {p.name}
                </button>
              ))}
            </div>
          </div>

          {/* Ton */}
          <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
            <label className="block text-sm font-semibold text-slate-700 mb-3">🎨 Ton de la légende</label>
            <div className="grid grid-cols-3 gap-2">
              {TONES.map(t => (
                <button key={t.id} onClick={() => setTone(t.id)}
                  className={`flex flex-col items-center gap-1 px-2 py-3 rounded-xl border-2 text-xs font-medium transition-all ${
                    tone === t.id ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-slate-200 hover:border-slate-300 text-slate-600'
                  }`}>
                  <span className="text-xl">{t.emoji}</span>
                  <span className="font-semibold">{t.label}</span>
                  <span className="text-slate-400 text-center leading-tight">{t.desc}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Résumé des réponses */}
          {Object.values(answers).some(v => v) && (
            <div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-4 text-xs text-indigo-700 space-y-1">
              <div className="font-semibold mb-2">📝 Résumé pour l'IA :</div>
              {answers.sujet && <div>• Sujet : {answers.sujet}</div>}
              {answers.objectif && <div>• Objectif : {OBJECTIFS.find(o => o.id === answers.objectif)?.label}</div>}
              {answers.cible && <div>• Cible : {answers.cible}</div>}
              {answers.offre && <div>• Offre : {answers.offre}</div>}
              {answers.cta && <div>• CTA : {answers.cta}</div>}
            </div>
          )}

          {error && (
            <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700">{error}</div>
          )}

          <div className="flex gap-3 mt-auto">
            <button onClick={onBack} className="flex-1 border border-slate-300 text-slate-600 py-3 rounded-xl font-medium hover:bg-slate-50 transition-all">
              ← Retour
            </button>
            <button onClick={generate} disabled={loading}
              className="flex-[2] bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
              {loading ? <><Spinner /> Génération...</> : '✨ Générer avec l\'IA'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Step 3: Edit, Preview & Publish ─────────────────────────────────────────

function Step3Publish({ media, generated, onBack, onDone, showToast }) {
  const [caption, setCaption] = useState(generated.caption);
  const [hashtags, setHashtags] = useState(generated.hashtags || []);
  const [newTag, setNewTag] = useState('');
  const [platform, setPlatform] = useState(generated.platform);
  const [scheduledAt, setScheduledAt] = useState('');
  const [publishing, setPublishing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [activeTab, setActiveTab] = useState('edit');

  const limit = CHAR_LIMITS[platform];
  const captionLen = caption.length;
  const over = captionLen > limit;

  const addTag = () => {
    const tag = newTag.trim().replace(/^#*/, '#');
    if (tag.length > 1 && !hashtags.includes(tag)) {
      setHashtags([...hashtags, tag]);
    }
    setNewTag('');
  };

  const removeTag = (tag) => setHashtags(hashtags.filter(t => t !== tag));

  const buildFormData = (scheduleAt = null) => {
    const fd = new FormData();
    fd.append('media_path', media.path);
    fd.append('media_type', media.media_type);
    fd.append('platform', platform);
    fd.append('caption', caption);
    fd.append('hashtags', JSON.stringify(hashtags));
    if (scheduleAt) fd.append('scheduled_at', scheduleAt);
    return fd;
  };

  const schedule = async () => {
    if (!scheduledAt) { showToast('Choisissez une date et heure', 'error'); return; }
    setSaving(true);
    try {
      await api('/api/posts', { method: 'POST', body: buildFormData(scheduledAt) });
      showToast('Post planifié avec succès !', 'success');
      onDone();
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  const publishNow = async () => {
    setPublishing(true);
    try {
      const fd = buildFormData();
      const post = await api('/api/posts', { method: 'POST', body: fd });
      await api(`/api/publish/${post.id}`, { method: 'POST' });
      showToast('Post publié avec succès ! 🎉', 'success');
      onDone();
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setPublishing(false);
    }
  };

  const saveOnly = async () => {
    setSaving(true);
    try {
      await api('/api/posts', { method: 'POST', body: buildFormData() });
      showToast('Post sauvegardé', 'info');
      onDone();
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  const copyToClipboard = () => {
    const text = caption + (hashtags.length ? '\n\n' + hashtags.join(' ') : '');
    navigator.clipboard.writeText(text)
      .then(() => showToast('Texte copié ! Collez-le directement sur votre réseau. 📋', 'success'))
      .catch(() => showToast('Impossible de copier automatiquement', 'error'));
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-4xl mx-auto">
      {/* Gauche : édition */}
      <div>
        <h2 className="text-2xl font-bold text-slate-900 mb-1">Finaliser le post</h2>
        <p className="text-slate-500 mb-5">Éditez le contenu généré par l'IA puis publiez</p>

        {/* Tabs */}
        <div className="flex border-b border-slate-200 mb-5">
          {[['edit', '✏️ Éditer'], ['preview', '👁️ Aperçu']].map(([id, label]) => (
            <button key={id} onClick={() => setActiveTab(id)}
              className={`px-4 py-2 text-sm font-medium border-b-2 transition-all ${activeTab === id ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
              {label}
            </button>
          ))}
        </div>

        {activeTab === 'edit' ? (
          <>
            {/* Sélecteur plateforme */}
            <div className="mb-4">
              <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Plateforme</label>
              <div className="flex gap-1.5 flex-wrap">
                {PLATFORMS.map(p => (
                  <button key={p.id} onClick={() => setPlatform(p.id)}
                    className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-xs font-medium transition-all ${platform === p.id ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-slate-200 text-slate-600 hover:border-slate-300'}`}>
                    <span style={{ color: p.color }}>{p.icon}</span>{p.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Légende */}
            <div className="mb-4">
              <div className="flex justify-between items-center mb-1.5">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Légende</label>
                <span className={`text-xs ${over ? 'text-red-500 font-semibold' : 'text-slate-400'}`}>{captionLen} / {limit}</span>
              </div>
              <textarea value={caption} onChange={e => setCaption(e.target.value)} rows={6}
                className={`w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 resize-none transition-all ${over ? 'border-red-400 focus:ring-red-300' : 'border-slate-300 focus:ring-indigo-400'}`} />
            </div>

            {/* Hashtags */}
            <div className="mb-5">
              <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Hashtags ({hashtags.length})</label>
              <div className="flex flex-wrap gap-1.5 mb-2 min-h-[32px]">
                {hashtags.map(tag => (
                  <span key={tag} className="hashtag-chip" onClick={() => removeTag(tag)}>
                    {tag} <span className="opacity-50 text-xs">×</span>
                  </span>
                ))}
              </div>
              <div className="flex gap-2">
                <input value={newTag} onChange={e => setNewTag(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addTag()}
                  placeholder="Ajouter un hashtag..." className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                <button onClick={addTag} className="bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 transition-all">+</button>
              </div>
            </div>

            {/* Planification */}
            <div className="mb-6 p-4 bg-amber-50 border border-amber-200 rounded-xl">
              <label className="text-xs font-semibold text-amber-700 uppercase tracking-wide mb-2 block">📅 Planifier la publication</label>
              <input type="datetime-local" value={scheduledAt} onChange={e => setScheduledAt(e.target.value)}
                min={new Date().toISOString().slice(0, 16)}
                className="w-full border border-amber-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400" />
            </div>

            {/* Actions */}
            <div className="space-y-2.5">
              {/* Copier — toujours disponible, sans config */}
              <button onClick={copyToClipboard} disabled={over}
                className="w-full bg-emerald-500 text-white py-3 rounded-xl font-semibold hover:bg-emerald-600 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                📋 Copier le texte — coller sur le réseau
              </button>

              {/* Publier automatiquement */}
              <button onClick={publishNow} disabled={publishing || over}
                className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                {publishing ? <><Spinner /> Publication...</> : '🚀 Publier automatiquement (Ayrshare)'}
              </button>

              <div className="flex gap-2">
                <button onClick={schedule} disabled={!scheduledAt || saving || over}
                  className="flex-1 bg-amber-500 text-white py-2.5 rounded-xl font-medium hover:bg-amber-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                  {saving ? <Spinner size={4} /> : '📅'} Planifier
                </button>
                <button onClick={saveOnly} disabled={saving}
                  className="flex-1 border border-slate-300 text-slate-600 py-2.5 rounded-xl font-medium hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                  💾 Sauvegarder
                </button>
              </div>
              <button onClick={onBack} className="w-full text-slate-400 text-sm hover:text-slate-600 py-1">← Retour</button>
            </div>
          </>
        ) : (
          <div className="lg:hidden">
            <PlatformPreview platform={platform} media={media} caption={caption} hashtags={hashtags} />
          </div>
        )}
      </div>

      {/* Droite : preview (desktop) */}
      <div className="hidden lg:block">
        <div className="sticky top-6">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">Aperçu · {getPlatform(platform)?.name}</h3>
          <PlatformPreview platform={platform} media={media} caption={caption} hashtags={hashtags} />
        </div>
      </div>
    </div>
  );
}

// ─── Vue : Créer un post ──────────────────────────────────────────────────────

function CreateView({ showToast, onPostCreated }) {
  const [step, setStep] = useState(1);
  const [media, setMedia] = useState(null);
  const [generated, setGenerated] = useState(null);

  const reset = () => { setStep(1); setMedia(null); setGenerated(null); };

  if (step === 1) return (
    <div>
      <StepBar step={1} />
      <Step1Upload onNext={(m) => { setMedia(m); setStep(2); }} />
    </div>
  );

  if (step === 2) return (
    <div>
      <StepBar step={2} />
      <Step2Configure media={media} onNext={(g) => { setGenerated(g); setStep(3); }} onBack={() => setStep(1)} />
    </div>
  );

  if (step === 3) return (
    <div>
      <StepBar step={3} />
      <Step3Publish media={media} generated={generated} onBack={() => setStep(2)} onDone={() => { reset(); onPostCreated(); }} showToast={showToast} />
    </div>
  );
}

// ─── Vue : Posts planifiés ────────────────────────────────────────────────────

function PostsView({ showToast, onRefresh }) {
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [publishingId, setPublishingId] = useState(null);

  const fetchPosts = async () => {
    try {
      const data = await api('/api/posts');
      setPosts(data);
    } catch (e) {
      showToast('Erreur de chargement', 'error');
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { fetchPosts(); }, []);

  const handlePublish = async (id) => {
    setPublishingId(id);
    try {
      await api(`/api/publish/${id}`, { method: 'POST' });
      showToast('Post publié ! 🎉', 'success');
      fetchPosts();
      onRefresh();
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setPublishingId(null);
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('Supprimer ce post ?')) return;
    try {
      await api(`/api/posts/${id}`, { method: 'DELETE' });
      setPosts(p => p.filter(x => x.id !== id));
      showToast('Post supprimé', 'info');
      onRefresh();
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  if (loading) return <div className="flex justify-center py-20"><Spinner size={8} /></div>;

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-2xl font-bold text-slate-900">Posts</h2>
          <p className="text-slate-500">{posts.length} post{posts.length !== 1 ? 's' : ''} au total</p>
        </div>
        <button onClick={fetchPosts} className="border border-slate-300 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-slate-50 transition-all">↻ Actualiser</button>
      </div>

      {posts.length === 0 ? (
        <div className="text-center py-20">
          <div className="text-5xl mb-4">📭</div>
          <p className="text-slate-500 font-medium">Aucun post pour l'instant</p>
          <p className="text-slate-400 text-sm mt-1">Créez votre premier post dans l'onglet "Créer"</p>
        </div>
      ) : (
        <div className="space-y-4">
          {posts.map(post => {
            const plat = getPlatform(post.platform);
            let tags = [];
            try { tags = JSON.parse(post.hashtags || '[]'); } catch {}

            return (
              <div key={post.id} className="bg-white rounded-2xl border border-slate-200 p-4 flex gap-4 items-start shadow-sm hover:shadow-md transition-shadow">
                {/* Miniature */}
                <div className="w-20 h-20 rounded-xl overflow-hidden bg-slate-100 flex-shrink-0">
                  {post.media_type === 'video' ? (
                    <video src={post.media_path} className="w-full h-full object-cover" />
                  ) : (
                    <img src={post.media_path} alt="" className="w-full h-full object-cover" />
                  )}
                </div>
                {/* Info */}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-1 flex-wrap">
                    <span className="flex items-center gap-1 text-sm font-semibold" style={{ color: plat?.color }}>
                      {plat?.icon} {plat?.name}
                    </span>
                    <Badge status={post.status} />
                    {post.scheduled_at && post.status === 'pending' && (
                      <span className="text-xs text-slate-500">📅 {formatDate(post.scheduled_at)}</span>
                    )}
                  </div>
                  <p className="text-sm text-slate-700 line-clamp-2 mb-1">{post.caption}</p>
                  {tags.length > 0 && (
                    <p className="text-xs text-indigo-400 truncate">{tags.slice(0, 5).join(' ')}{tags.length > 5 ? ' ...' : ''}</p>
                  )}
                  {post.error_message && (
                    <p className="text-xs text-red-500 mt-1">⚠️ {post.error_message}</p>
                  )}
                  <p className="text-xs text-slate-400 mt-1">Créé le {formatDate(post.created_at)}</p>
                </div>
                {/* Actions */}
                <div className="flex flex-col gap-2 flex-shrink-0">
                  {post.status !== 'published' && (
                    <button onClick={() => handlePublish(post.id)} disabled={publishingId === post.id}
                      className="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-all flex items-center gap-1 disabled:opacity-60">
                      {publishingId === post.id ? <Spinner size={3} /> : '🚀'} Publier
                    </button>
                  )}
                  <button onClick={() => handleDelete(post.id)}
                    className="border border-red-200 text-red-500 text-xs px-3 py-1.5 rounded-lg hover:bg-red-50 transition-all">
                    🗑️ Supprimer
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BusinessView({ showToast, onProfileSaved }) {
  const EMPTY = { nom: '', secteur: '', description: '', audience: '', valeurs: '', site: '' };
  const [profile, setProfile] = useState(EMPTY);
  const [saving, setSaving] = useState(false);
  const [generating, setGenerating] = useState(false);

  useEffect(() => {
    api('/api/business').then(data => {
      if (data && Object.keys(data).length > 0) setProfile(p => ({ ...p, ...data }));
    }).catch(() => {});
  }, []);

  const set = (key, val) => setProfile(p => ({ ...p, [key]: val }));

  const generateProfile = async () => {
    if (!profile.nom.trim()) { showToast('Entrez d\'abord le nom de votre commerce', 'error'); return; }
    setGenerating(true);
    try {
      const data = await api('/api/business/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: profile.nom }),
      });
      setProfile(p => ({ ...p, ...data }));
      showToast('Profil généré ! Vérifiez et ajustez si besoin.', 'success');
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setGenerating(false);
    }
  };

  const save = async () => {
    setSaving(true);
    try {
      await api('/api/business', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(profile),
      });
      onProfileSaved(profile.nom);
      showToast('Profil sauvegardé ! Claude l\'utilisera pour tous vos posts.', 'success');
    } catch (e) {
      showToast(e.message, 'error');
    } finally {
      setSaving(false);
    }
  };

  const isComplete = profile.nom && profile.description;

  return (
    <div className="max-w-2xl">
      <div className="flex items-center gap-3 mb-1">
        <h2 className="text-2xl font-bold text-slate-900">Mon Business</h2>
        {isComplete && <span className="bg-green-100 text-green-700 text-xs px-2.5 py-1 rounded-full font-semibold">✓ Actif</span>}

      <p className="text-slate-500 mb-7">Ces infos sont mémorisées et utilisées automatiquement par l'IA à chaque génération de post.</p>

      {/* Nom + bouton IA */}
      <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border border-indigo-200 rounded-2xl p-5 mb-6">
        <label className="block text-sm font-semibold text-slate-700 mb-2">🏢 Nom de votre commerce</label>
        <div className="flex gap-2">
          <input type="text" value={profile.nom} onChange={e => set('nom', e.target.value)}
            placeholder="Ex: La Boulangerie du Coin, Studio Photo Alex..."
            className="flex-1 border border-indigo-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" />
          <button onClick={generateProfile} disabled={generating || !profile.nom.trim()}
            className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-4 py-2.5 rounded-xl text-sm font-semibold hover:opacity-90 transition-all flex items-center gap-2 disabled:opacity-50 whitespace-nowrap">
            {generating ? <><Spinner size={4} /> Analyse...</> : '✨ Générer le profil'}
          </button>
        </div>
        <p className="text-xs text-indigo-500 mt-2">Tapez votre nom et cliquez "Générer le profil" — l'IA créera automatiquement votre description.</p>
      </div>

      <div className="space-y-4">
        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Secteur d'activité</label>
          <input type="text" value={profile.secteur} onChange={e => set('secteur', e.target.value)}
            placeholder="Ex: Restauration, Mode, Beauté, Artisanat, Services..."
            className="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Description de votre activité</label>
          <textarea value={profile.description} onChange={e => set('description', e.target.value)} rows={3}
            placeholder="Ex: Pizzeria artisanale spécialisée dans les pizzas au feu de bois avec des produits locaux..."
            className="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none" />
        </div>

        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Votre clientèle habituelle</label>
          <input type="text" value={profile.audience} onChange={e => set('audience', e.target.value)}
            placeholder="Ex: Familles et professionnels de 25-50 ans, passionnés de cuisine..."
            className="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Valeurs & personnalité</label>
          <input type="text" value={profile.valeurs} onChange={e => set('valeurs', e.target.value)}
            placeholder="Ex: Authenticité, qualité artisanale, convivialité, local..."
            className="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>

        <div>
          <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">
            Site web <span className="text-slate-400 normal-case font-normal">(optionnel)</span>
          </label>
          <input type="text" value={profile.site} onChange={e => set('site', e.target.value)}
            placeholder="Ex: www.moncommerce.fr"
            className="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        </div>
      </div>

      {/* Aperçu du profil actif */}
      {isComplete && (
        <div className="mt-6 bg-slate-50 border border-slate-200 rounded-2xl p-4">
          <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Ce que Claude sait sur vous</div>
          <div className="space-y-1.5 text-sm text-slate-700">
            <div><span className="font-semibold">Commerce :</span> {profile.nom}</div>
            {profile.secteur && <div><span className="font-semibold">Secteur :</span> {profile.secteur}</div>}
            <div><span className="font-semibold">Activité :</span> {profile.description}</div>
            {profile.audience && <div><span className="font-semibold">Clientèle :</span> {profile.audience}</div>}
            {profile.valeurs && <div><span className="font-semibold">Valeurs :</span> {profile.valeurs}</div>}
            {profile.site && <div><span className="font-semibold">Site :</span> {profile.site}</div>}
          </div>
        </div>
      )}

      <button onClick={save} disabled={saving || !profile.nom.trim()}
        className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-slate-700 transition-all flex items-center justify-center gap-2 disabled:opacity-50">
        {saving ? <><Spinner size={4} /> Sauvegarde...</> : '💾 Sauvegarder mon profil business'}
      </button>
    </div>
  );
}

// ─── Navigation mobile (barre du bas) ────────────────────────────────────────

function MobileNav({ view, setView, postsCount }) {
  const items = [
    { id: 'create',   label: 'Créer',    icon: '✨' },
    { id: 'posts',    label: 'Posts',    icon: '📅', badge: postsCount },
    { id: 'business', label: 'Business', icon: '🏢' },
    { id: 'settings', label: 'Réglages', icon: '⚙️' },
  ];
  return (
    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex z-50 lg:hidden safe-bottom">
      {items.map(item => (
        <button key={item.id} onClick={() => setView(item.id)}
          className={`flex-1 py-2.5 flex flex-col items-center gap-0.5 transition-all ${
            view === item.id ? 'text-indigo-600' : 'text-slate-400 active:text-indigo-400'
          }`}>
          <span className="text-xl relative">
            {item.icon}
            {item.badge > 0 && (
              <span className="absolute -top-1 -right-2 bg-indigo-600 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center leading-none font-bold">
                {item.badge}
              </span>
            )}
          </span>
          <span className="text-xs font-medium">{item.label}</span>
        </button>
      ))}
    </nav>
  );
}

// ─── Bannière d'installation PWA ─────────────────────────────────────────────

function InstallBanner() {
  const [prompt, setPrompt] = useState(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setPrompt(e); setVisible(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  if (!visible) return null;

  return (
    <div className="fixed top-0 left-0 right-0 z-50 bg-indigo-600 text-white px-4 py-3 flex items-center gap-3 shadow-lg lg:hidden">
      <span className="text-2xl">📲</span>
      <div className="flex-1">
        <div className="text-sm font-semibold">Installer l'application</div>
        <div className="text-xs opacity-80">Accès rapide depuis votre écran d'accueil</div>
      </div>
      <button onClick={async () => { if (prompt) { prompt.prompt(); const r = await prompt.userChoice; if (r.outcome === 'accepted') setVisible(false); } }}
        className="bg-white text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold">
        Installer
      </button>
      <button onClick={() => setVisible(false)} className="opacity-60 text-lg leading-none">×</button>
    </div>
  );
}

// ─── App principale ───────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState('create');
  const [toast, setToast] = useState(null);
  const [pendingCount, setPendingCount] = useState(0);
  const [bizName, setBizName] = useState('');

  const showToast = (message, type = 'info') => setToast({ message, type });

  const refreshCount = async () => {
    try {
      const posts = await api('/api/posts');
      setPendingCount(posts.filter(p => p.status === 'pending').length);
    } catch {}
  };

  useEffect(() => {
    refreshCount();
    api('/api/business').then(d => { if (d?.nom) setBizName(d.nom); }).catch(() => {});
  }, []);

  return (
    <div className="min-h-screen flex bg-slate-50">
      <InstallBanner />

      {/* Sidebar desktop uniquement */}
      <div className="hidden lg:block">
        <Sidebar view={view} setView={setView} postsCount={pendingCount} bizName={bizName} />
      </div>

      {/* Contenu principal */}
      <main className="flex-1 lg:ml-60 min-h-screen">
        {/* Header mobile */}
        <div className="lg:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-2.5 sticky top-0 z-40">
          <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold">S</div>
          <div>
            <div className="font-bold text-slate-900 text-sm leading-tight">Social Post Creator</div>
            {bizName && <div className="text-xs text-indigo-500">🏢 {bizName}</div>}
          </div>
        </div>

        {/* Vue active — padding bas pour la nav mobile */}
        <div className="p-4 lg:p-8 pb-24 lg:pb-8">
          <div className="max-w-5xl mx-auto">
            {view === 'create'   && <CreateView showToast={showToast} onPostCreated={refreshCount} />}
            {view === 'posts'    && <PostsView showToast={showToast} onRefresh={refreshCount} />}
            {view === 'business' && <BusinessView showToast={showToast} onProfileSaved={name => setBizName(name)} />}
            {view === 'settings' && <SettingsView showToast={showToast} />}
          </div>
        </div>
      </main>

      {/* Nav mobile bas de page */}
      <MobileNav view={view} setView={setView} postsCount={pendingCount} />

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Enregistrement du Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
